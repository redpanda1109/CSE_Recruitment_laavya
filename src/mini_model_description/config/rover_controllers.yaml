controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:

    right_wheel_names: ["Revolute 29", "Revolute 30", "Revolute 31"]
    left_wheel_names: ["Revolute 36", "Revolute 37", "Revolute 38"]

    wheel_separation: 1.0
    wheel_radius: 0.15

    publish_rate: 50

    odom_frame_id: odom
    base_frame_id: base_link

    use_stamped_vel: false
